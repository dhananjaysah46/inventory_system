<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Inventory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #0F172A;
            --sidebar-hover: #1E293B;
            --accent: #F59E0B;
            --accent-light: #FEF3C7;
            --accent-dark: #D97706;
            --bg: #F5F4F0;
            --surface: #FFFFFF;
            --border: #E8E6E0;
            --text-primary: #1A1A2E;
            --text-secondary: #64748B;
            --text-muted: #94A3B8;
            --success: #059669;
            --success-bg: #ECFDF5;
            --danger: #DC2626;
            --danger-bg: #FEF2F2;
            --info: #2563EB;
            --info-bg: #EFF6FF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 240px;
            background: var(--sidebar-bg);
            height: 100vh;
            position: fixed;
            display: flex;
            flex-direction: column;
            transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
            overflow: hidden;
            z-index: 50;
        }

        .sidebar.collapsed { width: 68px; }

        .sidebar-top {
            padding: 1.5rem 1.2rem 1rem;
            border-bottom: 1px solid #1E293B;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            white-space: nowrap;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .logo-text {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.3px;
        }

        .logo-sub {
            font-size: 0.7rem;
            color: #475569;
            font-weight: 400;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .toggle-btn {
            width: 28px;
            height: 28px;
            background: #1E293B;
            color: #94A3B8;
            border: 1px solid #334155;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 1rem 1.2rem;
            transition: all 0.2s;
        }

        .toggle-btn:hover { background: #334155; color: #fff; }

        .sidebar-nav { flex: 1; padding: 0.5rem 0.8rem; }

        .nav-label {
            font-size: 0.65rem;
            font-weight: 600;
            color: #334155;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.5rem 0.4rem;
            white-space: nowrap;
        }

        .sidebar.collapsed .nav-label { opacity: 0; }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.65rem 0.8rem;
            color: #94A3B8;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 0.2rem;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .nav-item:hover { background: var(--sidebar-hover); color: #E2E8F0; }

        .nav-item.active {
            background: #1C2A44;
            color: var(--accent);
            border-left: 3px solid var(--accent);
            padding-left: calc(0.8rem - 3px);
        }

        .nav-icon { font-size: 1.1rem; width: 20px; text-align: center; flex-shrink: 0; }

        .sidebar.collapsed .nav-text,
        .sidebar.collapsed .logo-text,
        .sidebar.collapsed .logo-sub { opacity: 0; width: 0; overflow: hidden; }

        .sidebar.collapsed .nav-item { justify-content: center; padding: 0.65rem; }
        .sidebar.collapsed .nav-item.active { border-left: none; padding: 0.65rem; }

        .sidebar-bottom {
            padding: 1rem 0.8rem;
            border-top: 1px solid #1E293B;
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.65rem 0.8rem;
            color: #64748B;
            background: none;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            width: 100%;
            transition: all 0.15s;
            white-space: nowrap;
            font-family: 'Outfit', sans-serif;
        }

        .logout-btn:hover { background: #1E293B; color: #F87171; }
        .sidebar.collapsed .logout-btn { justify-content: center; }
        .sidebar.collapsed .logout-text { opacity: 0; width: 0; overflow: hidden; }

        /* ── Main ── */
        .main {
            margin-left: 240px;
            padding: 2rem 2.5rem;
            width: 100%;
            transition: margin-left 0.3s cubic-bezier(0.4,0,0.2,1);
        }

        .main.expanded { margin-left: 68px; }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .page-subtitle { font-size: 0.88rem; color: var(--text-muted); margin-top: 0.2rem; }

        .btn-primary {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1.2rem;
            background: var(--accent);
            color: #1A1A2E;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s;
            font-family: 'Outfit', sans-serif;
        }

        .btn-primary:hover { background: var(--accent-dark); color: #fff; }

        /* ── Summary Cards ── */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .summary-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.2rem 1.4rem;
        }

        .s-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.4rem;
        }

        .s-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            font-family: 'DM Mono', monospace;
        }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.4rem;
            border-bottom: 1px solid var(--border);
            background: #FAFAF8;
        }

        .card-title {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .result-count {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-family: 'DM Mono', monospace;
        }

        /* ── Filter Bar ── */
        .filter-bar {
            display: flex;
            gap: 0.8rem;
            padding: 1rem 1.4rem;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .filter-input {
            flex: 1;
            min-width: 200px;
            padding: 0.6rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 0.88rem;
            color: var(--text-primary);
            outline: none;
            font-family: 'Outfit', sans-serif;
            transition: border 0.15s;
            background: var(--surface);
        }

        .filter-input:focus { border-color: var(--accent); }

        .filter-select {
            padding: 0.6rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 0.88rem;
            color: var(--text-primary);
            outline: none;
            background: var(--surface);
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            transition: border 0.15s;
        }

        .filter-select:focus { border-color: var(--accent); }

        /* ── Table ── */
        .data-table { width: 100%; border-collapse: collapse; }

        .data-table th {
            text-align: left;
            padding: 0.7rem 1rem;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            background: #FAFAF8;
            border-bottom: 1px solid var(--border);
        }

        .data-table td {
            padding: 0.85rem 1rem;
            font-size: 0.88rem;
            color: var(--text-primary);
            border-bottom: 1px solid #F5F4F0;
        }

        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: #FAFAF8; }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: 'DM Mono', monospace;
        }

        .badge-success { background: var(--success-bg); color: var(--success); }
        .badge-danger { background: var(--danger-bg); color: var(--danger); }
        .badge-info { background: var(--info-bg); color: var(--info); }
        .badge-amber { background: var(--accent-light); color: var(--accent-dark); }

        .sku-badge {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: var(--bg);
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
        .empty-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,0.6);
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(2px);
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--surface);
            border-radius: 16px;
            padding: 0;
            width: 460px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.2);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.3rem 1.5rem;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--surface);
            z-index: 1;
        }

        .modal-header h3 {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .close-btn {
            width: 32px;
            height: 32px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
        }

        .close-btn:hover { background: var(--danger-bg); color: var(--danger); }

        .modal-body { padding: 1.5rem; }

        .form-group { margin-bottom: 1.1rem; }

        .form-label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .form-control {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 0.92rem;
            color: var(--text-primary);
            outline: none;
            transition: border 0.15s;
            background: var(--surface);
            font-family: 'Outfit', sans-serif;
        }

        .form-control:focus { border-color: var(--accent); }

        .error-box {
            background: var(--danger-bg);
            border: 1px solid #FECACA;
            color: var(--danger);
            padding: 0.7rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }

        .modal-footer {
            display: flex;
            gap: 0.8rem;
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            background: #FAFAF8;
        }

        .btn-cancel {
            flex: 1;
            padding: 0.75rem;
            background: var(--surface);
            color: var(--text-secondary);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
        }

        .btn-cancel:hover { background: var(--bg); }

        .btn-save {
            flex: 2;
            padding: 0.75rem;
            background: var(--accent);
            color: #1A1A2E;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            transition: background 0.15s;
        }

        .btn-save:hover { background: var(--accent-dark); color: #fff; }
        .btn-save:disabled { background: #FDE68A; cursor: not-allowed; }

        .add-category-link {
            font-size: 0.8rem;
            color: var(--accent-dark);
            cursor: pointer;
            margin-top: 0.4rem;
            display: inline-block;
            font-weight: 600;
        }

        .add-category-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <div class="sidebar-logo">
                <div class="logo-icon">📦</div>
                <div>
                    <div class="logo-text">Inventory</div>
                    <div class="logo-sub">Management</div>
                </div>
            </div>
        </div>

        <button class="toggle-btn" id="toggle-btn">◀</button>

        <nav class="sidebar-nav">
            <div class="nav-label">Main Menu</div>
            <a href="index.html" class="nav-item">
                <span class="nav-icon">📊</span>
                <span class="nav-text">Dashboard</span>
            </a>
            <a href="products.html" class="nav-item active">
                <span class="nav-icon">🏷️</span>
                <span class="nav-text">Products</span>
            </a>
            <a href="purchases.html" class="nav-item">
                <span class="nav-icon">🛒</span>
                <span class="nav-text">Purchases</span>
            </a>
            <a href="sales.html" class="nav-item">
                <span class="nav-icon">💰</span>
                <span class="nav-text">Sales</span>
            </a>
        </nav>

        <div class="sidebar-bottom">
            <button class="logout-btn" id="logout-btn">
                <span class="nav-icon">🚪</span>
                <span class="logout-text">Logout</span>
            </button>
        </div>
    </div>

    <!-- Main -->
    <div class="main" id="main">
        <div class="page-header">
            <div>
                <div class="page-title">Products</div>
                <div class="page-subtitle">सबै products र stock हेर्नुस्</div>
            </div>
            <button class="btn-primary" id="add-product-btn">
                + नयाँ Product
            </button>
        </div>

        <!-- Summary -->
        <div class="summary-grid">
            <div class="summary-card">
                <div class="s-label">📦 कुल Products</div>
                <div class="s-value" id="total-products">—</div>
            </div>
            <div class="summary-card">
                <div class="s-label">⚠️ Low Stock</div>
                <div class="s-value" style="color:var(--danger)" id="low-stock-count">—</div>
            </div>
            <div class="summary-card">
                <div class="s-label">🗂️ Categories</div>
                <div class="s-value" style="color:var(--accent-dark)" id="total-categories">—</div>
            </div>
        </div>

        <!-- Table Card -->
        <div class="card">
            <!-- Filter Bar -->
            <div class="filter-bar">
                <input type="text" id="search-input" class="filter-input"
                    placeholder="🔍 Product नाम वा SKU खोज्नुस्...">
                <select id="category-filter" class="filter-select">
                    <option value="">सबै Categories</option>
                </select>
                <select id="stock-filter" class="filter-select">
                    <option value="">सबै Stock</option>
                    <option value="low">⚠️ Low Stock मात्र</option>
                    <option value="ok">✅ ठीक Stock</option>
                </select>
            </div>

            <!-- Header -->
            <div class="card-header">
                <div class="card-title">Products List</div>
                <div class="result-count" id="result-count"></div>
            </div>

            <!-- Table -->
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>SKU</th>
                        <th>Category</th>
                        <th>Cost</th>
                        <th>Price</th>
                        <th>Margin</th>
                        <th>Stock</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="products-table">
                    <tr>
                        <td colspan="8" class="empty-state">
                            <div class="empty-icon">🏷️</div>
                            Loading...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h3>➕ नयाँ Product थप्नुस्</h3>
                <button class="close-btn" id="close-modal">✕</button>
            </div>

            <div class="modal-body">
                <div class="error-box" id="modal-error"></div>

                <div class="form-group">
                    <label class="form-label">Category *</label>
                    <select class="form-control" id="category">
                        <option value="">— Category छान्नुस् —</option>
                    </select>
                    <span class="add-category-link" id="add-category-link">
                        + नयाँ Category थप्नुस्
                    </span>
                </div>

                <div class="form-group" id="new-category-group" style="display:none">
                    <label class="form-label">नयाँ Category</label>
                    <div style="display:flex; gap:0.5rem">
                        <input type="text" class="form-control" id="new-category-name"
                            placeholder="Category नाम हाल्नुस्">
                        <button class="btn-save" id="save-category-btn"
                            style="flex:none; padding:0.7rem 1rem; white-space:nowrap">
                            थप्नुस्
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Product नाम *</label>
                    <input type="text" class="form-control" id="name"
                        placeholder="e.g. Rice 5kg">
                </div>

                <div class="form-group">
                    <label class="form-label">SKU *</label>
                    <input type="text" class="form-control" id="sku"
                        placeholder="e.g. RICE-5KG-001"
                        style="font-family:'DM Mono',monospace">
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.8rem">
                    <div class="form-group">
                        <label class="form-label">Cost Price (Rs.) *</label>
                        <input type="number" class="form-control" id="cost_price"
                            placeholder="0.00" step="0.01">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Selling Price (Rs.) *</label>
                        <input type="number" class="form-control" id="selling_price"
                            placeholder="0.00" step="0.01">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Low Stock Threshold</label>
                    <input type="number" class="form-control" id="low_stock_threshold"
                        value="10" min="1">
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn-cancel" id="cancel-btn">रद्द गर्नुस्</button>
                <button class="btn-save" id="save-btn">✅ Product Save गर्नुस्</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // ── Sidebar ──
        const sidebar = document.getElementById('sidebar');
        const main = document.getElementById('main');
        const toggleBtn = document.getElementById('toggle-btn');
        let isCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';

        function applySidebarState() {
            sidebar.classList.toggle('collapsed', isCollapsed);
            main.classList.toggle('expanded', isCollapsed);
            toggleBtn.textContent = isCollapsed ? '▶' : '◀';
        }

        toggleBtn.addEventListener('click', () => {
            isCollapsed = !isCollapsed;
            localStorage.setItem('sidebar-collapsed', isCollapsed);
            applySidebarState();
        });

        applySidebarState();

        // ── Data ──
        let allProducts = [];
        let categoriesCache = [];

        async function loadProducts() {
            const res = await apiFetch('/api/products/');
            const data = await res.json();
            allProducts = data.results || data;
            renderProducts(allProducts);
        }

        function renderProducts(products) {
            const tbody = document.getElementById('products-table');
            document.getElementById('result-count').textContent =
                `${products.length} वटा`;
            document.getElementById('total-products').textContent =
                allProducts.length;
            document.getElementById('low-stock-count').textContent =
                allProducts.filter(p => p.is_low_stock).length;

            if (products.length === 0) {
                tbody.innerHTML = `
                    <tr><td colspan="8" class="empty-state">
                        <div class="empty-icon">🔍</div>
                        कुनै product भेटिएन!
                    </td></tr>`;
                return;
            }

            tbody.innerHTML = products.map(p => `
                <tr>
                    <td><strong>${p.name}</strong></td>
                    <td><span class="sku-badge">${p.sku}</span></td>
                    <td style="color:var(--text-secondary)">${p.category_name}</td>
                    <td>Rs. ${parseFloat(p.cost_price).toLocaleString()}</td>
                    <td><strong>Rs. ${parseFloat(p.selling_price).toLocaleString()}</strong></td>
                    <td><span class="badge badge-success">
                        +Rs. ${parseFloat(p.profit_margin).toLocaleString()}
                    </span></td>
                    <td style="font-family:'DM Mono',monospace; font-weight:500">
                        ${p.current_stock}
                    </td>
                    <td>
                        ${p.is_low_stock
                            ? '<span class="badge badge-danger">⚠ कम</span>'
                            : '<span class="badge badge-success">✓ ठीक</span>'
                        }
                    </td>
                </tr>
            `).join('');
        }

        function applyFilters() {
            const search = document.getElementById('search-input').value.trim().toLowerCase();
            const cat = document.getElementById('category-filter').value;
            const stock = document.getElementById('stock-filter').value;

            let filtered = allProducts;
            if (search) filtered = filtered.filter(p =>
                p.name.toLowerCase().includes(search) ||
                p.sku.toLowerCase().includes(search)
            );
            if (cat) filtered = filtered.filter(p => p.category.toString() === cat);
            if (stock === 'low') filtered = filtered.filter(p => p.is_low_stock);
            else if (stock === 'ok') filtered = filtered.filter(p => !p.is_low_stock);

            renderProducts(filtered);
        }

        async function loadCategories() {
            const res = await apiFetch('/api/categories/');
            const data = await res.json();
            categoriesCache = data.results || data;

            const modalSelect = document.getElementById('category');
            modalSelect.innerHTML = '<option value="">— Category छान्नुस् —</option>';
            const filterSelect = document.getElementById('category-filter');
            filterSelect.innerHTML = '<option value="">सबै Categories</option>';

            categoriesCache.forEach(c => {
                modalSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
                filterSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            });

            document.getElementById('total-categories').textContent = categoriesCache.length;
        }

        async function saveCategory() {
            const name = document.getElementById('new-category-name').value.trim();
            if (!name) return;
            const res = await apiFetch('/api/categories/', {
                method: 'POST',
                body: JSON.stringify({ name })
            });
            const data = await res.json();
            if (res.ok) {
                await loadCategories();
                document.getElementById('category').value = data.id;
                document.getElementById('new-category-group').style.display = 'none';
                document.getElementById('new-category-name').value = '';
            }
        }

        async function saveProduct() {
            const errorEl = document.getElementById('modal-error');
            errorEl.style.display = 'none';

            const body = {
                category: document.getElementById('category').value,
                name: document.getElementById('name').value.trim(),
                sku: document.getElementById('sku').value.trim(),
                cost_price: document.getElementById('cost_price').value,
                selling_price: document.getElementById('selling_price').value,
                low_stock_threshold: document.getElementById('low_stock_threshold').value,
            };

            if (!body.category || !body.name || !body.sku || !body.cost_price || !body.selling_price) {
                errorEl.textContent = 'सबै * fields भर्नुस्!';
                errorEl.style.display = 'block';
                return;
            }

            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.textContent = 'Saving...';

            const res = await apiFetch('/api/products/', {
                method: 'POST',
                body: JSON.stringify(body)
            });
            const data = await res.json();

            if (res.ok) {
                closeModal();
                loadProducts();
            } else {
                errorEl.textContent = Object.values(data).flat().join(' ');
                errorEl.style.display = 'block';
            }

            saveBtn.disabled = false;
            saveBtn.textContent = '✅ Product Save गर्नुस्';
        }

        function openModal() { document.getElementById('modal').classList.add('active'); }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            ['name','sku','cost_price','selling_price'].forEach(id => {
                document.getElementById(id).value = '';
            });
            document.getElementById('low_stock_threshold').value = '10';
            document.getElementById('category').value = '';
            document.getElementById('new-category-group').style.display = 'none';
            document.getElementById('modal-error').style.display = 'none';
        }

        // Events
        document.getElementById('add-category-link').addEventListener('click', () => {
            const g = document.getElementById('new-category-group');
            g.style.display = g.style.display === 'none' ? 'block' : 'none';
        });

        document.getElementById('add-product-btn').addEventListener('click', openModal);
        document.getElementById('cancel-btn').addEventListener('click', closeModal);
        document.getElementById('close-modal').addEventListener('click', closeModal);
        document.getElementById('save-btn').addEventListener('click', saveProduct);
        document.getElementById('save-category-btn').addEventListener('click', saveCategory);
        document.getElementById('logout-btn').addEventListener('click', logout);
        document.getElementById('search-input').addEventListener('input', applyFilters);
        document.getElementById('category-filter').addEventListener('change', applyFilters);
        document.getElementById('stock-filter').addEventListener('change', applyFilters);

        loadProducts();
        loadCategories();
    </script>
</body>
</html>
